<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Message</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #04ff00;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: white;
            font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            text-transform: uppercase;
            font-weight: 700;
            background-color: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 2rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
           
        }

        div{
            max-height: 950px;
            z-index: -4;
        }

        #message-container {
            width: 90%;
            max-width: 550px;
            display: flex;
            flex-direction: column-reverse;
            gap: 15px;
            margin-bottom: 20px;
        }

        .msg-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            transform-origin: bottom center;
        }

        /* Animasi popup */
        .msg-new {
            animation: popup 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popup {
            0% {
                transform: translateY(50px) scale(0.6);
                opacity: 0;
            }

            60% {
                transform: translateY(-8px) scale(1.04);
                opacity: 1;
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .msg-user {
            color: #38bdf8;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        .msg-text {
            font-size: 2rem;
            line-height: 1.4;
            word-wrap: break-word;
            color: white;
        }

        .msg-time {
            font-size: 0.75rem;
            color: #cbd5e1;
            display: block;
            text-align: right;
            margin-top: 10px;
        }

        .btn-link {
            background: white;
            color: black;
            padding: 12px 22px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-link:hover {
            transform: scale(1.05);
        }

        .empty {
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 20px;
        }
        .live-dot {
            width: 25px;
            height: 25px;
            background: red;
            border-radius: 50%;

            /* efek glow */
            box-shadow: 0 0 10px red;
        }

        .header {
            width: 90%;
            max-width: 550px;
            display: flex;
            justify-content: space-between;
        }

        .t {
            background: none;
        }
    </style>
</head>

<body>
    <!-- <header class="header">
        <h1 class="t">    </h1>

        <h1><span class="live-dot"></span>
            Live
        </h1>
    </header> -->

    <div id="message-container">
        <div class="empty">Menunggu pesan...</div>
    </div>

    <!-- <a href="/send" target="_blank" class="btn-link">
        Kirim Pesan
    </a> -->

   <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        const container = document.getElementById('message-container');

        let previousLastMessage = null;

        function render(msgs) {
            container.innerHTML = '';

            if (msgs.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        Belum ada pesan...
                    </div>
                `;
                return;
            }

            msgs.slice().reverse().forEach((msg) => {

                const div = document.createElement('div');
                div.className = 'msg-card';

                // cek apakah ini pesan terbaru
                const isNewest =
                    previousLastMessage &&
                    msg.time === msgs[msgs.length - 1].time &&
                    msg.text === msgs[msgs.length - 1].text;

                // tambahkan animasi hanya untuk pesan baru
                if (isNewest) {
                    div.classList.add('msg-new');
                }

                div.innerHTML = `
                    <span class="msg-user">
                        @${msg.username}
                    </span>

                    <div class="msg-text">
                        ${msg.text}
                    </div>

                    <span class="msg-time">
                        ${msg.time}
                    </span>
                `;

                container.appendChild(div);
            });

            // simpan pesan terakhir
            previousLastMessage = msgs[msgs.length - 1];
        }

        socket.on('init_messages', (msgs) => {
            previousLastMessage = msgs[msgs.length - 1];
            render(msgs);
        });

        socket.on('update_messages', render);
    </script>
</body>
</html>
