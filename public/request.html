<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Lagu Berbayar</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.6);
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            letter-spacing: 0.02em;
            text-align: center;
        }

        p {
            color: #cbd5e1;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e2e8f0;
        }

        input, textarea, select {
            width: 100%;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 14px;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            margin-bottom: 16px;
            outline: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .note {
            font-size: 14px;
            color: #94a3b8;
            text-align: center;
        }

        .link {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #60a5fa;
            text-decoration: none;
        }

        .msg {
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
        }

        .msg.success {
            color: #22c55e;
        }

        .msg.error {
            color: #f87171;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Request Lagu Berbayar</h1>
        <p>Isi data berikut lalu lanjut ke pembayaran.</p>

        <label>Username</label>
        <input id="username" type="text" maxlength="20" placeholder="Nama atau panggilan" />

        <label>Lagu yang diminta</label>
        <input id="song" type="text" maxlength="60" placeholder="Judul lagu atau artis" />

        <label>Catatan tambahan</label>
        <textarea id="note" rows="4" placeholder="Misal: salam, shoutout, atau permintaan khusus"></textarea>

        <label>Jumlah Bayar (Rp)</label>
        <input id="amount" type="number" min="25000" step="1000" value="25000" placeholder="Minimal Rp 25.000" />

        <button id="request-button" type="button">Lanjut ke Pembayaran</button>
        <div class="msg" id="request-msg"></div>
        <a class="link" href="/send">Kembali ke kirim pesan</a>
    </div>

    <script>
        const requestButton = document.getElementById('request-button');
        const requestMsg = document.getElementById('request-msg');

        requestButton.addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const song = document.getElementById('song').value.trim();
            const note = document.getElementById('note').value.trim();
            const amount = document.getElementById('amount').value;

            requestMsg.textContent = '';
            requestMsg.className = 'msg';

            const amountNum = Number(amount);

            if (!username || !song) {
                requestMsg.textContent = 'Username dan nama lagu wajib diisi.';
                requestMsg.classList.add('error');
                return;
            }

            if (!amount || amountNum < 25000) {
                requestMsg.textContent = 'Minimal pembayaran Rp 25.000.';
                requestMsg.classList.add('error');
                return;
            }

            // Disable button & show loading
            requestButton.disabled = true;
            requestButton.innerHTML = '<span class="spinner"></span>Memproses...';

            try {
                const response = await fetch('/create-xendit-invoice', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, song, note, amount })
                });

                const result = await response.json();
                if (!result.success) {
                    requestMsg.textContent = result.message || 'Gagal membuat request.';
                    requestMsg.classList.add('error');
                    requestButton.disabled = false;
                    requestButton.textContent = 'Lanjut ke Pembayaran';
                    return;
                }

                // Simpan paymentId untuk referensi redirect
                localStorage.setItem('last_payment_id', result.checkoutUrl?.split('/').pop() || '');

                // Jika ada invoiceUrl dari Xendit, redirect langsung ke halaman Xendit
                if (result.invoiceUrl) {
                    window.location.href = result.invoiceUrl;
                    return;
                }

                // Fallback: redirect ke halaman checkout lokal
                if (result.checkoutUrl) {
                    window.location.href = result.checkoutUrl;
                    return;
                }

                requestMsg.textContent = 'Gagal mendapatkan URL pembayaran.';
                requestMsg.classList.add('error');
                requestButton.disabled = false;
                requestButton.textContent = 'Lanjut ke Pembayaran';
            } catch (err) {
                requestMsg.textContent = 'Terjadi kesalahan, coba lagi nanti.';
                requestMsg.classList.add('error');
                requestButton.disabled = false;
                requestButton.textContent = 'Lanjut ke Pembayaran';
            }
        });
    </script>
</body>
</html>
